<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script defer src="./js/script.js"></script>
    <title>Aurore Vernet - Compétences</title>
</head>
<body>
    <header>
        <component-header></component-header>
    </header>
    <main id="skills">
        <h2 class="title">COMPÉTENCES TECHNIQUES</h2>
        <section id="legend">
            <div>
                <img src="./img/skills/icon-beginner.svg" alt="Icône niveau débutant">
                <span>Débutant</span>
            </div>
            <div>
                <img src="./img/skills/icon-mid.svg" alt="Icône niveau intermédiaire">
                <span>Intermédiaire</span>
            </div>
            <div>
                <img src="./img/skills/icon-master.svg" alt="Icône niveau maitrîse">
                <span>Maîtrise</span>
            </div>
        </section>
        <section id="skills-items">
            <article>
                <h3 class="title">LANGAGES</h3>
                <div>
                    <img src="./img/skills/logo-html.svg" alt="Logo HTML">
                    <img src="./img/skills/logo-css.svg" alt="Logo CSS">               
                </div>
                <div>
                    <img src="./img/skills/logo-python.svg" alt="Logo Python">
                    <a href="https://auroreo.github.io/shifumi_overwatch/" target="_blank"><img src="./img/skills/logo-js.svg" alt="Logo JS"></a>
                </div>
                <div>
                    <img src="./img/skills/logo-php.svg" alt="Logo PHP">
                </div>
            </article>
            <article>
                <h3 class="title">OUTILS</h3>
                <div>
                    <img src="./img/skills/logo-figma.svg" alt="Logo Figma">
                    <img src="./img/skills/logo-illustrator.svg" alt="Logo Illustrator">
                    <img src="./img/skills/logo-premierepro.svg" alt="Logo Premiere Pro">
                    <img src="./img/skills/logo-vscode.svg" alt="Logo VSCode">
                </div>
                <div>
                    <img src="./img/skills/logo-wordpress.svg" alt="Logo WordPress">
                    <img src="./img/skills/logo-photoshop.svg" alt="Logo Photoshop">
                    <img src="./img/skills/logo-indesign.svg" alt="Logo inDesign">  
                    <img src="./img/skills/logo-trello.svg" alt="Logo Trello">

                </div>
                <div>
                    <img src="./img/skills/logo-phpmyadmin.svg" alt="Logo phpMyAdmin" class="big-logo">
                </div>
            </article>
            <article>
                <h3 class="title">FRAMEWORKS</h3>
                <div>
                    <a href="https://auroreo.github.io/ranking_of_films/" target="_blank"><img src="./img/skills/logo-vuejs.svg" alt="Logo Vue.js"></a>
                    <img src="./img/skills/logo-bootstrap.svg" alt="Logo Bootstrap"> 
                </div>
            </article>
        </section>
        <section id="skills-items-2">
            <article>
                <h3 class="title">BASE DE DONNÉES</h3>
                <div>
                    <img src="./img/skills/logo-mysql.svg" alt="Logo MySQL">
                </div>
            </article>
        </section>
    </main>
    <footer>
        <component-footer></component-footer>
    </footer>
</body>
</html>
